<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CG Mindset — Collection en préparation</title>
<meta name="description" content="CG Mindset. Streetwear & lifestyle. La boutique arrive bientôt.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0014;
    --bg-purple:#3a0060;
    --pink:#ff2e9c;
    --cyan:#2ee6ff;
    --gold:#ffcf40;
    --ink:#f2ecfa;
    --ink-dim:#b9a9cf;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg-deep);
    color:var(--ink);
    min-height:100vh;
    font-family:'Oswald',sans-serif;
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- backdrop ---------- */
  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .sun{
    position:fixed;left:50%;top:16%;transform:translateX(-50%);
    width:280px;height:280px;border-radius:50%;
    background:conic-gradient(from 180deg, var(--gold) 0%, var(--pink) 45%, var(--cyan) 75%, var(--gold) 100%);
    filter:blur(2px);
    opacity:.55;
    animation:pulse 7s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:.45; filter:blur(2px);}
    50%{opacity:.65; filter:blur(4px);}
  }
  .horizon{
    position:fixed;left:0;right:0;top:38%;height:1px;
    background:linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity:.4;
  }
  .grid{
    position:fixed;left:0;right:0;bottom:0;height:45vh;
    background-image:
      linear-gradient(var(--bg-deep) 0%, transparent 15%),
      repeating-linear-gradient(90deg, rgba(46,230,255,.18) 0 1px, transparent 1px calc(8vw));
    background-size:100% 100%, 100% 100%;
    -webkit-mask-image:linear-gradient(to top, black, transparent);
            mask-image:linear-gradient(to top, black, transparent);
    perspective:220px;
  }
  .grid::before{
    content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(0deg, rgba(255,46,156,.16) 0 1px, transparent 1px 7vh);
  }

  /* ---------- layout ---------- */
  main{
    position:relative;z-index:1;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    padding:8vh 6vw 6vh;
    gap:clamp(20px,4vh,36px);
  }

  .eyebrow{
    font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;
    color:var(--cyan);font-weight:500;
  }

  h1{
    font-family:'Permanent Marker',cursive;
    font-size:clamp(2.6rem,10vw,5.2rem);
    line-height:.95;
    color:var(--ink);
    text-shadow:
      0 0 14px rgba(255,46,156,.55),
      0 0 34px rgba(46,230,255,.35);
    letter-spacing:.01em;
  }

  .sub{
    font-weight:300;
    font-size:clamp(1rem,2.4vw,1.25rem);
    color:var(--ink-dim);
    max-width:34ch;
    line-height:1.5;
  }
  .sub strong{color:var(--gold);font-weight:500;}

  /* ---------- signature: the flip tag ---------- */
  .tag-wrap{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    margin-top:6px;
  }
  .tag-hint{
    font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink-dim);opacity:.7;
  }
  .tag{
    --w:180px;--h:70px;
    width:var(--w);height:var(--h);
    perspective:800px;
    cursor:pointer;
    -webkit-user-select:none;user-select:none;
  }
  .tag-inner{
    position:relative;width:100%;height:100%;
    transition:transform .6s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
  }
  .tag.flipped .tag-inner{transform:rotateY(180deg);}
  .tag-face{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    border-radius:6px;
    backface-visibility:hidden;
    border:1.5px dashed rgba(242,236,250,.4);
    font-family:'Oswald',sans-serif;
  }
  .tag-face.front{
    background:linear-gradient(160deg,#150022,#26003d);
    color:var(--ink-dim);
    font-size:.78rem;letter-spacing:.25em;text-transform:uppercase;
    flex-direction:column;gap:4px;
  }
  .tag-face.front::before{
    content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    width:2px;height:14px;background:rgba(242,236,250,.35);
  }
  .tag-face.back{
    background:linear-gradient(160deg,#3a0060,#1c0030);
    color:var(--gold);
    transform:rotateY(180deg);
    font-family:'Permanent Marker',cursive;
    font-size:1.15rem;
    text-shadow:0 0 10px rgba(255,207,64,.5);
  }

  .notify{
    margin-top:10px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .notify a.mail{
    color:var(--bg-deep);
    background:var(--cyan);
    font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:.82rem;
    padding:13px 28px;border-radius:2px;text-decoration:none;
    box-shadow:0 0 0 rgba(46,230,255,0);
    transition:box-shadow .25s ease, transform .25s ease;
  }
  .notify a.mail:hover{box-shadow:0 0 24px rgba(46,230,255,.55);transform:translateY(-1px);}
  .notify a.mail:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}

  .socials{display:flex;gap:22px;}
  .socials a{
    color:var(--ink-dim);text-decoration:none;
    font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;
    border-bottom:1px solid transparent;
    transition:color .2s ease, border-color .2s ease;
  }
  .socials a:hover,.socials a:focus-visible{color:var(--pink);border-color:var(--pink);}
  .socials a:focus-visible{outline:none;}

  footer{
    position:relative;z-index:1;
    text-align:center;
    padding:0 6vw 5vh;
    font-size:.68rem;letter-spacing:.1em;color:var(--ink-dim);opacity:.55;
  }

  @media (prefers-reduced-motion:reduce){
    .sun{animation:none;}
    .tag-inner{transition:none;}
  }
</style>
</head>
<body>

  <div class="bg">
    <div class="sun"></div>
    <div class="horizon"></div>
    <div class="grid"></div>
  </div>

  <main>
    <p class="eyebrow">Ruelle-sur-Touvre · Charente</p>
    <h1>CG MINDSET</h1>
    <p class="sub">La boutique est en train d'être cousue, pièce par pièce. Chaque vêtement cachera <strong>un message</strong>, à l'intérieur du col.</p>

    <div class="tag-wrap">
      <span class="tag-hint">Retourne l'étiquette</span>
      <div class="tag" role="button" tabindex="0" aria-label="Retourner l'étiquette pour révéler un message caché">
        <div class="tag-inner">
          <div class="tag-face front">
            <span>CG</span><span>Mindset</span>
          </div>
          <div class="tag-face back" data-word>EVOLVE</div>
        </div>
      </div>
    </div>

    <div class="notify">
      <a class="mail" href="mailto:contact@cgmindset.fr?subject=Tenez-moi%20inform%C3%A9%20du%20lancement">Être prévenu·e au lancement</a>
      <nav class="socials" aria-label="Réseaux sociaux CG Mindset">
        <a href="https://www.instagram.com/cg_mindset_fr" target="_blank" rel="noopener">Instagram</a>
        <a href="mailto:contact@cgmindset.fr">Contact</a>
      </nav>
    </div>
  </main>

  <footer>© 2026 CG Mindset — Tous droits réservés</footer>

<script>
  const words = ["EVOLVE","BREATHE","FOCUS","FREE","TRUST","ALIVE","HEAL","FEEL","STRONGER"];
  const tag = document.querySelector('.tag');
  const wordEl = document.querySelector('[data-word]');
  let i = 0;

  function toggle(){
    tag.classList.toggle('flipped');
    if(tag.classList.contains('flipped')){
      i = (i + 1) % words.length;
      wordEl.textContent = words[i];
    }
  }

  tag.addEventListener('click', toggle);
  tag.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); }
  });
</script>

</body>
</html>
